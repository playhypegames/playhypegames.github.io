<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 160" role="img" aria-label="PlayHype Games logo">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset=".55" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset=".5" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- mark: play tile with speed streaks -->
  <g transform="translate(20 20)">
    <rect x="4" y="4" width="112" height="112" rx="27" fill="url(#tile)"/>
    <path d="M31 4 h58 a27 27 0 0 1 27 27 v6 Q60 16 4 37 v-6 A27 27 0 0 1 31 4 Z" fill="#fff" opacity=".13"/>
    <rect x="24" y="42" width="14" height="8" rx="4" fill="#fff" opacity=".9"/>
    <rect x="16" y="56" width="22" height="8" rx="4" fill="#fff" opacity=".7"/>
    <rect x="24" y="70" width="14" height="8" rx="4" fill="#fff" opacity=".9"/>
    <path d="M52 38 L90 60 L52 82 Z" fill="#fff" stroke="#fff" stroke-width="10" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="170" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="1" fill="url(#word)">PLAYHYPE</text>
  <text x="172" y="128" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" letter-spacing="14" fill="#8b93b8">GAMES</text>
</svg>
